# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Flutter Build and Test only

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.41.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify Pigeon generated files are in sync
        run: |
          dart run pigeon --input pigeons/voice_api.dart
          if ! git diff --quiet -- \
              lib/src/voice/generated/voice_api.g.dart \
              ios/Classes/Generated/VoiceApi.g.swift \
              android/src/main/kotlin/com/dev/flutter_twilio/generated/VoiceApi.g.kt; then
            echo "::error::Pigeon generated files are out of date. Run ./tool/pigeon_generate.sh and commit the result."
            git --no-pager diff -- \
              lib/src/voice/generated/voice_api.g.dart \
              ios/Classes/Generated/VoiceApi.g.swift \
              android/src/main/kotlin/com/dev/flutter_twilio/generated/VoiceApi.g.kt
            exit 1
          fi

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage
